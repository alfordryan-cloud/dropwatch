# Prometheus configuration for DROPWATCH

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API server metrics
  - job_name: 'dropwatch-api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics

  # Worker metrics
  - job_name: 'dropwatch-worker'
    static_configs:
      - targets: ['worker:3001']
    metrics_path: /metrics

  # Redis metrics (if using redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # PostgreSQL metrics (if using postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
